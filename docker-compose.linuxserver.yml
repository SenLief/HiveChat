version: '3.8'

services:
  app:
    container_name: hivechat-app
    build:
      context: .
      dockerfile: Dockerfile.linuxserver
      args:
        HOST_PORT: ${HOST_PORT:-3000}
        DATABASE_URL: "postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/hivechat"
        AUTH_SECRET: ${AUTH_SECRET}
        ADMIN_CODE: ${ADMIN_CODE:-11223344}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
        EMAIL_AUTH_STATUS: ${EMAIL_AUTH_STATUS:-ON}
        FEISHU_AUTH_STATUS: ${FEISHU_AUTH_STATUS:-OFF}
        FEISHU_CLIENT_ID: ${FEISHU_CLIENT_ID:-}
        FEISHU_CLIENT_SECRET: ${FEISHU_CLIENT_SECRET:-}
        WECOM_AUTH_STATUS: ${WECOM_AUTH_STATUS:-OFF}
        WECOM_CLIENT_ID: ${WECOM_CLIENT_ID:-}
        WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
        WECOM_CLIENT_SECRET: ${WECOM_CLIENT_SECRET:-}
        DINGDING_AUTH_STATUS: ${DINGDING_AUTH_STATUS:-OFF}
        DINGDING_CLIENT_ID: ${DINGDING_CLIENT_ID:-}
        DINGDING_CLIENT_SECRET: ${DINGDING_CLIENT_SECRET:-}
    ports:
      - "${HOST_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # LinuxServer 权限配置
      PUID: ${PUID:-1000}
      PGID: ${PGID:-10}
      TZ: ${TZ:-UTC}
      
      # 应用配置
      NODE_ENV: production
      IS_DOCKER: true
      
      # 数据库配置
      DATABASE_URL: "postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/hivechat"
      
      # 认证配置
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_CODE: ${ADMIN_CODE:-11223344}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      
      # 邮件认证
      EMAIL_AUTH_STATUS: ${EMAIL_AUTH_STATUS:-ON}
      
      # 飞书认证
      FEISHU_AUTH_STATUS: ${FEISHU_AUTH_STATUS:-OFF}
      FEISHU_CLIENT_ID: ${FEISHU_CLIENT_ID:-}
      FEISHU_CLIENT_SECRET: ${FEISHU_CLIENT_SECRET:-}
      
      # 企业微信认证
      WECOM_AUTH_STATUS: ${WECOM_AUTH_STATUS:-OFF}
      WECOM_CLIENT_ID: ${WECOM_CLIENT_ID:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      WECOM_CLIENT_SECRET: ${WECOM_CLIENT_SECRET:-}
      
      # 钉钉认证
      DINGDING_AUTH_STATUS: ${DINGDING_AUTH_STATUS:-OFF}
      DINGDING_CLIENT_ID: ${DINGDING_CLIENT_ID:-}
      DINGDING_CLIENT_SECRET: ${DINGDING_CLIENT_SECRET:-}
      
      # 代理配置（新增）
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      ALL_PROXY: ${ALL_PROXY:-}
    volumes:
      - hivechat_data:/app/data
    restart: unless-stopped
    networks:
      - hivechat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    container_name: hivechat-db
    image: lscr.io/linuxserver/postgres:16
    environment:
      # 数据库配置
      PUID: ${PUID:-1000}
      PGID: ${PGID:-10}
      POSTGRES_DB: hivechat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - hivechat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hivechat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/postgres
  
  hivechat_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/hivechat

networks:
  hivechat-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

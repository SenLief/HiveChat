name: Build and Push LinuxServer Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号'
        required: false
        default: 'latest'
      environment:
        description: '部署环境'
        required: false
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - development
  push:
    branches: [ main, develop ]
    paths:
      - 'Dockerfile.linuxserver'
      - 'docker-compose.linuxserver.yml'
      - 'app/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile.linuxserver'
      - 'docker-compose.linuxserver.yml'
      - 'app/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-linuxserver:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 设置 QEMU 以支持多平台构建
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      # 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: hivenexus/hivechat
          tags: |
            type=raw,value=${{ github.event.inputs.version || 'latest' }}-linuxserver
            type=raw,value=latest-linuxserver
            type=raw,value=linuxserver
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
      
      - name: Build and push LinuxServer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.linuxserver
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=linuxserver-${{ github.ref }}
          cache-to: type=gha,mode=max,scope=linuxserver-${{ github.ref }}
          provenance: false
          build-args: |
            HOST_PORT=3000
            DATABASE_URL=""
            AUTH_SECRET=${{ secrets.AUTH_SECRET || '' }}
            ADMIN_CODE=11223344
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
            AUTH_TRUST_HOST=true
            EMAIL_AUTH_STATUS=ON
            FEISHU_AUTH_STATUS=OFF
            FEISHU_CLIENT_ID=""
            FEISHU_CLIENT_SECRET=""
            WECOM_AUTH_STATUS=OFF
            WECOM_CLIENT_ID=""
            WECOM_AGENT_ID=""
            WECOM_CLIENT_SECRET=""
            DINGDING_AUTH_STATUS=OFF
            DINGDING_CLIENT_ID=""
            DINGDING_CLIENT_SECRET=""
      
      - name: Update deployment info
        if: github.event_name != 'pull_request'
        run: |
          echo "🚀 LinuxServer Docker镜像构建完成！"
          echo "📦 镜像标签: ${{ steps.meta.outputs.tags }}"
          echo "🏗️  构建平台: linux/amd64, linux/arm64"
          echo "🔧 Dockerfile: Dockerfile.linuxserver"
          echo "💡 使用方法:"
          echo "   docker pull hivenexus/hivechat:linuxserver"
          echo "   或使用 docker-compose.linuxserver.yml 部署"
